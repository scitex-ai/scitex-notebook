name: CLA Assistant
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/permissions preserved verbatim from the prior local file.
# owner_login/default_branch match the reusable workflow's defaults, so
# only owner_allowlist is overridden here (this repo's prior hardcoded
# allowlist includes "LLEmacs" in addition to the default "bot*,ywatanabe1989").
# NOTE: this repo's prior local file hardcoded the CLA doc URL to a
# DIFFERENT repo's CLA.md (pre-existing bug). The reusable workflow derives
# the URL from `github.repository` (the calling repo), so this migration
# also fixes that link — see PR description.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
